name: Deploy Angular

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Debug: show Node and npm versions
        run: |
          node -v
          npm -v

      - name: Debug: list project files
        run: |
          pwd
          ls -la

      - name: Debug: check node_modules for angular devkit
        run: |
          ls -la node_modules/@angular-devkit || true
          npm ls @angular-devkit/build-angular --depth=0 || true

      - name: Debug: npx angular cli version
        run: |
          npx -y @angular/cli@19.2.13 --version || true

      - name: Run angular build via npx
        run: npx -y @angular/cli@19.2.13 build --base-href=/demo-frontend/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/demo-frontend/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/deploy-pages@v4